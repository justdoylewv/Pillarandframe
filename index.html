<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Pillar &amp; Frame — Authentic storytelling. Productized.</title>
  <meta name="description" content="Two days of capture. A year of authentic content. The Trust Engine — built once, deployed forever. Three productized tiers. Free Trust Audit to start."/>
  <link rel="stylesheet" href="tokens.css"/>
  <link rel="icon" href="assets/logo-mark.svg"/>
  <style>
    body { margin: 0; background: var(--bg-deep); overflow-x: hidden; }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
    .container--narrow { max-width: 1120px; margin: 0 auto; padding: 0 32px; }
    .reveal { opacity: 0; transform: translateY(12px); transition: opacity 480ms var(--ease-out), transform 480ms var(--ease-out); }
    .reveal.is-visible { opacity: 1; transform: none; }

    button { font-family: var(--font-sans); }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 22px;
      border-radius: var(--r-md); font-weight: 600; font-size: 14.5px;
      cursor: pointer; transition: all 150ms var(--ease-out);
      border: 1px solid transparent; box-shadow: var(--inset-glow);
    }
    .btn:active { transform: scale(0.98); filter: brightness(0.92); }
    .btn--primary { background: var(--pf-aqua); color: #0B0B0B; }
    .btn--primary:hover { background: var(--pf-aqua-400); }
    .btn--emphasis { background: var(--grad-warm); color: #fff; box-shadow: var(--inset-glow), var(--glow-emphasis); }
    .btn--emphasis:hover { filter: brightness(1.08); }
    .btn--ghost { background: transparent; color: var(--fg-1); border-color: var(--border-2); }
    .btn--ghost:hover { background: var(--surface-1); border-color: var(--border-3); }
    .btn--lg { padding: 16px 26px; font-size: 15.5px; }

    .accent-blue   { --accent-dyn: var(--pf-aqua);   --accent-glow: var(--glow-aqua);   --accent-grad: linear-gradient(90deg, var(--pf-aqua), var(--pf-aqua-400)); }
    .accent-purple { --accent-dyn: var(--pf-violet); --accent-glow: var(--glow-violet); --accent-grad: linear-gradient(90deg, var(--pf-aqua), var(--pf-violet)); }
    .accent-pink   { --accent-dyn: var(--pf-rose);   --accent-glow: var(--glow-rose);   --accent-grad: linear-gradient(90deg, var(--pf-violet), var(--pf-rose)); }

    /* Section ground variants */
    .ground-dark  { background: var(--bg-deep); color: var(--fg-1); }
    .ground-mid   { background: var(--bg-elevated); color: var(--fg-1); }
    .ground-light { background: #F5F3EE; color: #14171E; }
    .ground-light .eyebrow { color: rgba(20,23,30,0.55); }
    .ground-light h1, .ground-light h2, .ground-light h3, .ground-light h4 { color: #0B0B0B; }
    .ground-light p { color: rgba(20,23,30,0.72); }
    .ground-light .hairline { border-color: rgba(11,11,11,0.08) !important; }
    .ground-light .surface-card { background: #fff; border-color: rgba(11,11,11,0.08); box-shadow: 0 1px 0 rgba(11,11,11,0.04); }
    .ground-light .faq-item { border-color: rgba(11,11,11,0.10); }
    .ground-light .num-chip { background: rgba(11,11,11,0.05); color: rgba(11,11,11,0.55); border-color: rgba(11,11,11,0.08); }
    .ground-light input, .ground-light textarea, .ground-light select {
      background: #fff; color: #14171E; border-color: rgba(11,11,11,0.12) !important;
    }
    /* Dark cards keep their own text colors even on a light ground */
    .ground-light .surface-card.dark-card,
    .ground-light .surface-card.dark-card h1,
    .ground-light .surface-card.dark-card h2,
    .ground-light .surface-card.dark-card h3,
    .ground-light .surface-card.dark-card h4,
    .ground-light .surface-card.dark-card p { color: var(--fg-1); }
    .ground-light .surface-card.dark-card h1,
    .ground-light .surface-card.dark-card h2,
    .ground-light .surface-card.dark-card h3,
    .ground-light .surface-card.dark-card h4 { color: var(--fg-pure); }
    .ground-light .surface-card.dark-card .eyebrow { color: var(--fg-2); }

    /* Section divider hairline */
    .section { padding: clamp(64px, 9vw, 128px) 0; }
    .section--tight { padding: clamp(48px, 6vw, 80px) 0; }

    /* Eyebrow re-decl as class */
    .eyebrow { font-size: 11.5px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-2); }

    .gradient-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 12px 6px 8px; border-radius: var(--r-full);
      background: rgba(255,255,255,0.04); border: 1px solid var(--border-1);
      font-size: 12px; color: var(--fg-1); font-weight: 500;
    }
    .gradient-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--grad-brand); }

    /* Frame motif */
    .frame {
      position: relative;
      padding: 8px;
      border-radius: calc(var(--r-lg) + 4px);
      background: linear-gradient(var(--surface-1),var(--surface-1)) padding-box,
                  var(--grad-brand) border-box;
      border: 1px solid transparent;
    }

    /* Focus */
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--pf-aqua) !important; box-shadow: 0 0 0 3px rgba(34,211,238,0.22); }

    /* Reveal */
    .stagger > * { transition-delay: 0ms; }
    .stagger > *:nth-child(2) { transition-delay: 60ms; }
    .stagger > *:nth-child(3) { transition-delay: 120ms; }
    .stagger > *:nth-child(4) { transition-delay: 180ms; }
    .stagger > *:nth-child(5) { transition-delay: 240ms; }

    @media (max-width: 900px) {
      .grid-3 { grid-template-columns: 1fr !important; }
      .grid-2 { grid-template-columns: 1fr !important; }
      .hero-split { grid-template-columns: 1fr !important; }
      .hero-bleed-text { padding: 24px !important; }
      .nav-links { display: none !important; }
      .h-display { font-size: 48px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="hero.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="dr-sections.jsx"></script>
  <script type="text/babel" src="contact-form.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
